<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Pomodoro</title>
</head>
<body>
    <header>
        <nav class="conjunto_nav">
            <nav class="navbar">
                <nav class="bloco_navbar">
                <h1>Pomodoro</h1>
                    <div>
                        <button id="cor"><i class="fa-solid fa-sun" style="color: var(--principal-text);"></i></button>
                        <button id="config"><i class="fa-solid fa-gear" style="color: var(--principal-text);"></i></button>
                    </div>
                </nav>
            </nav>
                <div class="aba_config">
                    <div>
                        <label for="mudar_velocidade">Velocidade do Timer</label>
                        <input type="range" id="mudar_velocidade" name="mudar_velocidade" min="1" max="1000">
                        <span id="valor_range">1s</span>
                        <p style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; font-size: 0.6rem;">Obs: essa mecânica só deve ser utilizada para testes</p>
                    </div>
                </div>
        </nav>
        
    </header>
    <main>
        <div class="conteiner">
            <div class="bloco">
                <div class="timer">
                    <label for="displayTimer">Tempo</label>
                    <input type="text" id="displayTimer" name="displayTimer" readonly>
                </div>
                <div class="insercao">
                    <input type="number" step="1" id="adicionarTempo" placeholder="T. Foco" max="60" min="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <input type="number" step="1" id="adicionarPausa" placeholder="T. Pausa" max="60" min="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <input type="number" step="1" id="quantidadePausa" placeholder="Q. Pausa" max="30" min="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="controle">
                    <button id="play"><i class="fa-solid fa-play"></i><p>Play</p></button>
                    <button id="pause"><i class="fa-solid fa-pause"></i> <p>Pause</p></button>
                    <button id="reset"><i class="fa-solid fa-arrows-rotate"></i><p>Reset</p></button>
                </div>
                <p id="erros">&nbsp;</p>
            </div>
        </div>
    </main>
    <footer>
        <div class="contato">
            <ul>
                <li><a href="https://github.com/tiago-neumann"><i class="fa-brands fa-github"></i></a></li>
                <li><a href="https://www.instagram.com/_tiagoneumann/"><i class="fa-brands fa-instagram"></i></a></li>
                <li><a href="https://wa.me/5547992190072"><i class="fa-solid fa-phone"></i></a></li>
            </ul>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
